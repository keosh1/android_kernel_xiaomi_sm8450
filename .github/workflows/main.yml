name: Add KernelSU Support and Commit Changes

on:
  push:
    branches:
      - lineage-21  # Replace with your actual branch
  pull_request:
    branches:
      - main

jobs:
  add-kernelsu:
    runs-on: ubuntu-latest
    env:
      TZ: Africa/Cairo

    steps:
    - name: Checkout source with submodules
      uses: actions/checkout@v2
      with:
        fetch-depth: 1
        submodules: true  # This ensures submodules are initialized

    - name: Set up KernelSU
      run: |
        # Run the KernelSU setup script
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

    - name: Commit KernelSU changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

        # Add all changes and commit
        git add .
        git commit -m "Add KernelSU support to kernel"

        # Push the changes to the correct branch
        git push origin lineage-21  # Replace 'master' with your actual branch
